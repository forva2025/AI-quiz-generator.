<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Quiz Generator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Quiz Generator</h1>
      <p>Enter a YouTube video URL to generate quiz questions.</p>
      <form id="quiz-form">
        <label for="url">YouTube URL</label>
        <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />

        <label for="num">Number of questions</label>
        <input id="num" type="number" min="1" max="20" value="5" />

        <label for="method">Method</label>
        <select id="method">
          <option value="heuristic" selected>Heuristic (free)</option>
          <option value="openai">OpenAI (requires key)</option>
        </select>

        <button type="submit">Generate</button>
      </form>

      <div id="status"></div>
      <div id="result" class="hidden">
        <h2 id="video-title"></h2>
        <ol id="questions"></ol>
      </div>
    </div>

    <script>
      const form = document.getElementById('quiz-form');
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const titleEl = document.getElementById('video-title');
      const listEl = document.getElementById('questions');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resultEl.classList.add('hidden');
        listEl.innerHTML = '';
        statusEl.textContent = 'Generating...';
        const payload = {
          url: document.getElementById('url').value.trim(),
          num_questions: parseInt(document.getElementById('num').value, 10) || 5,
          method: document.getElementById('method').value,
          languages: ['en','en-US','en-GB']
        };
        try {
          const resp = await fetch('/api/generate_quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!resp.ok) {
            const txt = await resp.text();
            throw new Error(`Request failed: ${resp.status} ${txt}`);
          }
          const data = await resp.json();
          titleEl.textContent = `${data.title} (${data.method})`;
          for (const q of data.questions) {
            const li = document.createElement('li');
            li.innerHTML = `<strong>Q:</strong> ${q.question}<br/><em>Answer:</em> ${q.answer}`;
            listEl.appendChild(li);
          }
          statusEl.textContent = '';
          resultEl.classList.remove('hidden');
        } catch (err) {
          statusEl.textContent = err.message || String(err);
        }
      });
    </script>
  </body>
</html>
